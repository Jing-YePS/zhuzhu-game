<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>奥特曼三关数学打怪兽</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #15131f;
      --panel: rgba(255, 255, 255, 0.13);
      --panel-strong: rgba(255, 255, 255, 0.19);
      --line: rgba(255, 255, 255, 0.27);
      --text: #fff8e8;
      --muted: #d8f2ff;
      --gold: #ffd45a;
      --hero-red: #f74754;
      --hero-silver: #f1f6ff;
      --hero-blue: #34d9ff;
      --green: #62e381;
      --pink: #ff6fcf;
      --orange: #ff9045;
      --shadow: rgba(0, 0, 0, 0.34);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: #15131f;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 212, 90, 0.16), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(98, 227, 129, 0.15), transparent 26%),
        radial-gradient(circle at 78% 76%, rgba(255, 111, 207, 0.16), transparent 28%),
        linear-gradient(145deg, #15131f 0%, #29333d 48%, #1c1928 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: var(--ink);
    }

    .game {
      position: relative;
      isolation: isolate;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(14px, 3vw, 30px);
      overflow: hidden;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 248, 232, 0.92) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(127, 227, 255, 0.78) 0 1.2px, transparent 1.6px);
      background-size: 82px 74px, 126px 118px;
      background-position: 4px 18px, 36px 52px;
      opacity: 0.58;
      z-index: -3;
      animation: drift 24s linear infinite;
    }

    .stars::before {
      content: "";
      background-size: 136px 108px, 190px 144px;
      background-position: 22px 4px, 0 76px;
      opacity: 0.42;
      animation-duration: 36s;
    }

    .stars::after {
      content: "";
      background-size: 226px 170px, 154px 202px;
      background-position: 12px 92px, 84px 0;
      opacity: 0.3;
      animation-duration: 48s;
    }

    @keyframes drift {
      to {
        transform: translate3d(-90px, 40px, 0);
      }
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      width: min(1120px, 100%);
      min-width: 0;
      margin: 0 auto 16px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 5vw, 44px);
      line-height: 1.08;
      font-weight: 900;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.18);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      font-weight: 700;
    }

    .scoreboard {
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 16px 34px var(--shadow);
    }

    .pause-button {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      background: #34d9ff;
      color: #071d2b;
      font-weight: 1000;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.24), 0 12px 20px rgba(0, 0, 0, 0.18);
    }

    .gem {
      width: clamp(30px, 6vw, 42px);
      height: clamp(30px, 6vw, 42px);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.28);
      transition: transform 220ms ease, background 220ms ease;
    }

    .gem svg {
      width: 70%;
      height: 70%;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.22));
    }

    .gem.done {
      background: rgba(255, 212, 90, 0.95);
      transform: scale(1.08);
    }

    .gem.miss {
      background: rgba(255, 91, 91, 0.9);
      transform: scale(0.94);
    }

    .arena {
      position: relative;
      flex: 1;
      width: min(1120px, 100%);
      min-width: 0;
      min-height: 500px;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-columns: minmax(170px, 1fr) minmax(250px, 1.08fr) minmax(170px, 1fr);
      align-items: end;
      min-width: 0;
      min-height: clamp(290px, 48vh, 450px);
      border-radius: 8px;
      padding: clamp(12px, 3vw, 26px);
      border: 1px solid var(--line);
      background:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.05));
      background-size: 38px 38px, 38px 38px, auto;
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 27%;
      background:
        linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.2)),
        repeating-linear-gradient(90deg, rgba(255, 212, 90, 0.24) 0 3px, transparent 3px 28px);
      clip-path: polygon(0 35%, 100% 8%, 100% 100%, 0% 100%);
      opacity: 0.86;
      z-index: -1;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 18%;
      background: linear-gradient(180deg, rgba(76, 238, 177, 0.14), rgba(39, 28, 40, 0.72));
      z-index: -2;
    }

    .hero-side,
    .monster-side {
      position: relative;
      display: grid;
      place-items: end center;
      min-width: 0;
    }

    .hero-wrap,
    .monster-wrap {
      position: relative;
      width: min(230px, 100%);
      aspect-ratio: 0.72;
      display: grid;
      place-items: end center;
    }

    .hero-wrap {
      animation: heroIdle 1.8s ease-in-out infinite;
      transform-origin: 50% 100%;
    }

    .hero-wrap.answering {
      animation: heroStrike 520ms ease-out;
    }

    .hero-wrap.hurt {
      animation: heroHurt 680ms cubic-bezier(0.2, 0.9, 0.28, 1);
    }

    @keyframes heroIdle {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes heroStrike {
      0% {
        transform: translateX(0) rotate(0);
      }

      44% {
        transform: translateX(42px) rotate(4deg);
      }

      100% {
        transform: translateX(0) rotate(0);
      }
    }

    @keyframes heroHurt {
      0% {
        transform: translateX(0) rotate(0) scale(1);
        filter: none;
      }

      18% {
        transform: translateX(-30px) rotate(-10deg) scale(0.96);
        filter: drop-shadow(0 0 18px rgba(255, 111, 91, 0.88));
      }

      38% {
        transform: translateX(-18px) rotate(7deg) scale(0.98);
      }

      62% {
        transform: translateX(-9px) rotate(-4deg) scale(1);
      }

      100% {
        transform: translateX(0) rotate(0) scale(1);
        filter: none;
      }
    }

    .hero-svg,
    .monster-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 20px 22px rgba(0, 0, 0, 0.34));
    }

    .hero-core {
      animation: pulseCore 980ms ease-in-out infinite;
      transform-origin: 50% 46%;
    }

    .hero-wrap.hurt .hero-core {
      fill: #ff263d;
      stroke: #ffe1e1;
      animation: redCoreAlarm 160ms steps(2, end) infinite;
      filter: drop-shadow(0 0 20px rgba(255, 38, 61, 1));
    }

    @keyframes pulseCore {
      50% {
        filter: drop-shadow(0 0 14px rgba(52, 217, 255, 0.98));
        transform: scale(1.08);
      }
    }

    @keyframes redCoreAlarm {
      0% {
        fill: #ff263d;
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(255, 38, 61, 0.8));
      }

      100% {
        fill: #ffb000;
        transform: scale(1.16);
        filter: drop-shadow(0 0 26px rgba(255, 55, 61, 1));
      }
    }

    .monster-wrap {
      transform-origin: 50% 100%;
      animation: monsterIdle 1.2s ease-in-out infinite;
    }

    @keyframes monsterIdle {
      0%,
      100% {
        transform: rotate(-1deg) translateY(0);
      }

      50% {
        transform: rotate(1.5deg) translateY(-8px);
      }
    }

    .monster-wrap.hit {
      animation: monsterHit 340ms ease-in-out 3;
    }

    .monster-wrap.attack {
      animation: monsterAttack 620ms cubic-bezier(0.18, 0.88, 0.32, 1);
    }

    @keyframes monsterHit {
      0%,
      100% {
        transform: translateX(0) rotate(0);
      }

      25% {
        transform: translateX(12px) rotate(4deg);
      }

      70% {
        transform: translateX(-14px) rotate(-5deg);
      }
    }

    @keyframes monsterAttack {
      0%,
      100% {
        transform: translateX(0) rotate(0);
      }

      28% {
        transform: translateX(-52px) rotate(-9deg) scale(1.04);
      }

      52% {
        transform: translateX(-32px) rotate(5deg) scale(1.02);
      }
    }

    .monster-wrap.defeated .monster-svg {
      opacity: 0;
      transform: scale(0.72);
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .monster-name,
    .hero-name {
      position: absolute;
      left: 50%;
      bottom: -4px;
      transform: translateX(-50%);
      padding: 6px 10px;
      min-width: max-content;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.36);
      background: rgba(21, 19, 31, 0.74);
      color: #fff9ec;
      font-weight: 900;
      font-size: clamp(13px, 2vw, 16px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }

    .question-zone {
      align-self: start;
      display: grid;
      gap: 10px;
      place-items: center;
      min-width: 0;
      padding-top: clamp(2px, 2vw, 18px);
    }

    .round-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .level-pill {
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--gold);
      color: #352000;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.22);
    }

    .timer-pill,
    .score-pill {
      min-width: 76px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(21, 19, 31, 0.72);
      color: #fff8e8;
      text-align: center;
      font-weight: 1000;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .timer-pill {
      color: #95ffac;
      font-variant-numeric: tabular-nums;
    }

    .timer-pill.danger {
      color: #ffef73;
      animation: timerDanger 320ms ease-in-out infinite alternate;
    }

    @keyframes timerDanger {
      to {
        transform: scale(1.08);
        filter: drop-shadow(0 0 12px rgba(255, 212, 90, 0.9));
      }
    }

    .speech {
      position: relative;
      width: min(340px, 100%);
      min-height: 116px;
      padding: clamp(14px, 3vw, 20px);
      border-radius: 8px;
      background: rgba(255, 248, 232, 0.96);
      color: #22202a;
      text-align: center;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.24);
      border: 3px solid rgba(255, 212, 90, 0.94);
    }

    .speech::after {
      content: "";
      position: absolute;
      right: -18px;
      top: 42px;
      width: 26px;
      height: 28px;
      background: rgba(255, 248, 232, 0.96);
      clip-path: polygon(0 20%, 100% 50%, 0 80%);
    }

    .monster-line {
      margin: 0 0 6px;
      color: #6b3756;
      font-size: clamp(14px, 2vw, 17px);
      font-weight: 900;
    }

    .problem {
      min-height: 1.2em;
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1.03;
      font-weight: 1000;
      color: #15131f;
      font-variant-numeric: tabular-nums;
    }

    .answer-panel {
      display: grid;
      grid-template-columns: minmax(190px, 1fr) auto;
      gap: 12px;
      align-items: stretch;
      width: min(620px, 100%);
      min-width: 0;
      margin: 0 auto;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.24);
    }

    .answer-display {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 74px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.92);
      color: #15131f;
      font-size: clamp(36px, 7vw, 58px);
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
      box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.08);
    }

    .answer-display.empty {
      color: rgba(21, 19, 31, 0.38);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, minmax(52px, 1fr));
      gap: 8px;
      min-width: 0;
    }

    .key,
    .action {
      min-width: 0;
      min-height: 52px;
      border-radius: 8px;
      font-weight: 1000;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.25), 0 10px 18px rgba(0, 0, 0, 0.18);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      touch-action: manipulation;
    }

    .key {
      background: #f8f6ee;
      color: #15131f;
      font-size: 25px;
    }

    .action {
      padding: 0 16px;
      background: var(--green);
      font-size: 20px;
      color: #07321c;
      white-space: nowrap;
    }

    .clear {
      background: #ffd45a;
      color: #352000;
    }

    .key:active,
    .action:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.25), 0 6px 12px rgba(0, 0, 0, 0.14);
    }

    .action:disabled,
    .key:disabled {
      cursor: default;
      filter: grayscale(0.45) brightness(0.86);
      transform: none;
    }

    .feedback {
      min-height: 32px;
      text-align: center;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 1000;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
    }

    .feedback.good {
      color: #95ffac;
    }

    .feedback.try {
      color: #ffd45a;
    }

    .beam {
      position: absolute;
      left: 24%;
      right: 24%;
      top: 46%;
      height: clamp(16px, 3vw, 28px);
      background: linear-gradient(90deg, transparent 0%, rgba(52, 217, 255, 0.92) 18%, rgba(255, 212, 90, 0.98) 56%, transparent 100%);
      filter: blur(2px) drop-shadow(0 0 12px rgba(52, 217, 255, 0.85));
      transform: scaleX(0);
      transform-origin: left center;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
    }

    .beam.fire {
      animation: fireBeam 560ms ease-out;
    }

    .stage.wrong {
      animation: stageWrongShake 360ms ease-in-out;
    }

    @keyframes stageWrongShake {
      0%,
      100% {
        transform: translateX(0);
      }

      22% {
        transform: translateX(-7px);
      }

      48% {
        transform: translateX(8px);
      }

      72% {
        transform: translateX(-4px);
      }
    }

    @keyframes fireBeam {
      0% {
        transform: scaleX(0);
        opacity: 0;
      }

      20%,
      68% {
        transform: scaleX(1);
        opacity: 1;
      }

      100% {
        transform: scaleX(1);
        opacity: 0;
      }
    }

    .impact {
      position: absolute;
      left: 18%;
      bottom: 35%;
      width: 126px;
      height: 126px;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: scale(0.5) rotate(-15deg);
      transform-origin: center;
      pointer-events: none;
      z-index: 8;
    }

    .impact::before,
    .impact::after {
      content: "";
      position: absolute;
      inset: 8px;
      background: #ffd45a;
      clip-path: polygon(50% 0, 59% 33%, 96% 19%, 70% 50%, 100% 72%, 63% 66%, 54% 100%, 42% 67%, 5% 82%, 30% 51%, 0 29%, 38% 35%);
      filter: drop-shadow(0 0 18px rgba(255, 212, 90, 0.9));
    }

    .impact::after {
      inset: 24px;
      background: #ff5b5b;
      transform: rotate(18deg);
      opacity: 0.9;
    }

    .impact span {
      position: relative;
      z-index: 1;
      color: #15131f;
      font-size: 30px;
      font-weight: 1000;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.5);
    }

    .impact.show {
      animation: impactPop 720ms ease-out;
    }

    @keyframes impactPop {
      0% {
        opacity: 0;
        transform: scale(0.35) rotate(-22deg);
      }

      20%,
      58% {
        opacity: 1;
        transform: scale(1) rotate(8deg);
      }

      100% {
        opacity: 0;
        transform: scale(1.18) rotate(18deg);
      }
    }

    .answer-bubble {
      position: absolute;
      left: 18%;
      top: 20%;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(52, 217, 255, 0.94);
      color: #071d2b;
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 1000;
      transform: translateY(12px) scale(0.8);
      opacity: 0;
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.24);
      pointer-events: none;
      z-index: 5;
    }

    .answer-bubble.show {
      animation: popAnswer 1s ease-out;
    }

    @keyframes popAnswer {
      0% {
        transform: translateY(12px) scale(0.8);
        opacity: 0;
      }

      20%,
      72% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-16px) scale(0.96);
        opacity: 0;
      }
    }

    .explosion {
      position: absolute;
      right: 12%;
      bottom: 24%;
      width: 190px;
      height: 190px;
      transform: translate(50%, 20%) scale(0);
      opacity: 0;
      z-index: 7;
      pointer-events: none;
    }

    .explosion.boom {
      animation: boom 760ms ease-out;
    }

    .explosion span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: var(--gold);
      box-shadow: 0 0 22px rgba(255, 212, 90, 0.92);
      transform: translate(-50%, -50%) rotate(var(--r)) translateY(var(--d));
    }

    .explosion span:nth-child(2n) {
      background: #ff6f4f;
    }

    .explosion span:nth-child(3n) {
      background: #34d9ff;
    }

    @keyframes boom {
      0% {
        transform: translate(50%, 20%) scale(0.2);
        opacity: 0;
        filter: blur(0);
      }

      20% {
        transform: translate(50%, 20%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(50%, 20%) scale(1.65);
        opacity: 0;
        filter: blur(2px);
      }
    }

    .finale {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(180deg, rgba(21, 19, 31, 0.38), rgba(21, 19, 31, 0.92)),
        radial-gradient(circle at 50% 78%, rgba(255, 212, 90, 0.18), transparent 30%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 360ms ease;
    }

    .finale.show {
      opacity: 1;
      pointer-events: auto;
    }

    #fireworks {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .final-card {
      position: relative;
      width: min(760px, 92vw);
      text-align: center;
      padding: clamp(26px, 6vw, 54px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(10px);
    }

    .final-card h2 {
      margin: 0;
      font-size: clamp(42px, 10vw, 92px);
      line-height: 1.05;
      color: #fff8e8;
      text-shadow: 0 5px 0 rgba(0, 0, 0, 0.2);
    }

    .restart {
      margin-top: 22px;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 8px;
      background: var(--gold);
      color: #352000;
      font-size: 20px;
      font-weight: 1000;
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.25), 0 14px 24px rgba(0, 0, 0, 0.22);
    }

    .defeat {
      position: fixed;
      inset: 0;
      z-index: 22;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 91, 91, 0.28), transparent 28%),
        linear-gradient(180deg, rgba(21, 19, 31, 0.55), rgba(21, 19, 31, 0.96));
      opacity: 0;
      pointer-events: none;
      transition: opacity 360ms ease;
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }

      if (!audioCtx) {
        audioCtx = new AudioContextClass();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      return audioCtx;
    }

    function makeNoiseSource(ctx, duration) {
      const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * duration));
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      return source;
    }

    function makeDistortionCurve(amount) {
      const samples = 44100;
      const curve = new Float32Array(samples);
      const deg = Math.PI / 180;
      for (let i = 0; i < samples; i += 1) {
        const x = (i * 2) / samples - 1;
        curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function connectLoudMaster(ctx, volume, destination = ctx.destination) {
      const master = ctx.createGain();
      const compressor = ctx.createDynamicsCompressor();
      compressor.threshold.setValueAtTime(-18, ctx.currentTime);
      compressor.knee.setValueAtTime(18, ctx.currentTime);
      compressor.ratio.setValueAtTime(8, ctx.currentTime);
      compressor.attack.setValueAtTime(0.003, ctx.currentTime);
      compressor.release.setValueAtTime(0.18, ctx.currentTime);
      master.gain.setValueAtTime(volume, ctx.currentTime);
      master.connect(compressor);
      compressor.connect(destination);
      return master;
    }

    function playMonsterRoar() {
      const ctx = getAudioContext();
      if (!ctx) {
        return;
      }

      const now = ctx.currentTime;
      const master = connectLoudMaster(ctx, 1.3);
      const distortion = ctx.createWaveShaper();
      distortion.curve = makeDistortionCurve(90);
      distortion.oversample = "4x";
      const roarBus = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(1.3, now + 0.035);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 1.15);
      roarBus.connect(distortion);
      distortion.connect(master);

      [0, 0.18, 0.38].forEach((offset, index) => {
        const osc = ctx.createOscillator();
        const growl = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        osc.type = index === 1 ? "square" : "sawtooth";
        osc.frequency.setValueAtTime(230 - index * 28, now + offset);
        osc.frequency.exponentialRampToValueAtTime(54 + index * 12, now + offset + 0.44);
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(920, now + offset);
        filter.frequency.exponentialRampToValueAtTime(150, now + offset + 0.46);
        growl.gain.setValueAtTime(0.0001, now + offset);
        growl.gain.exponentialRampToValueAtTime(1.05, now + offset + 0.035);
        growl.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.52);
        osc.connect(filter);
        filter.connect(growl);
        growl.connect(roarBus);
        osc.start(now + offset);
        osc.stop(now + offset + 0.58);
      });

      const noise = makeNoiseSource(ctx, 1.05);
      const noiseFilter = ctx.createBiquadFilter();
      const noiseGain = ctx.createGain();
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.setValueAtTime(360, now);
      noiseFilter.frequency.exponentialRampToValueAtTime(120, now + 0.9);
      noiseFilter.Q.setValueAtTime(0.95, now);
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.48, now + 0.05);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.05);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(roarBus);
      noise.start(now);

      const drop = ctx.createOscillator();
      const dropGain = ctx.createGain();
      drop.type = "sine";
      drop.frequency.setValueAtTime(80, now + 0.04);
      drop.frequency.exponentialRampToValueAtTime(28, now + 0.7);
      dropGain.gain.setValueAtTime(0.0001, now + 0.02);
      dropGain.gain.exponentialRampToValueAtTime(1.35, now + 0.08);
      dropGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.78);
      drop.connect(dropGain);
      dropGain.connect(master);
      drop.start(now + 0.02);
      drop.stop(now + 0.84);
    }

    function playHeroScream() {
      const ctx = getAudioContext();
      if (!ctx) {
        return;
      }

      const now = ctx.currentTime;
      const master = connectLoudMaster(ctx, 1.05);
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(1.05, now + 0.025);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.92);

      const thump = ctx.createOscillator();
      const thumpGain = ctx.createGain();
      thump.type = "sine";
      thump.frequency.setValueAtTime(120, now);
      thump.frequency.exponentialRampToValueAtTime(34, now + 0.22);
      thumpGain.gain.setValueAtTime(1.15, now);
      thumpGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
      thump.connect(thumpGain);
      thumpGain.connect(master);
      thump.start(now);
      thump.stop(now + 0.28);

      [0, 0.018].forEach((offset, index) => {
        const scream = ctx.createOscillator();
        const screamGain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        scream.type = index === 0 ? "triangle" : "sawtooth";
        scream.frequency.setValueAtTime(860 + index * 120, now + 0.04 + offset);
        scream.frequency.linearRampToValueAtTime(1320 + index * 180, now + 0.16 + offset);
        scream.frequency.exponentialRampToValueAtTime(330 + index * 60, now + 0.78 + offset);
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(1120 + index * 260, now + 0.04 + offset);
        filter.Q.setValueAtTime(5.5, now);
        screamGain.gain.setValueAtTime(0.0001, now + 0.03 + offset);
        screamGain.gain.exponentialRampToValueAtTime(index === 0 ? 0.88 : 0.46, now + 0.1 + offset);
        screamGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.84 + offset);
        scream.connect(filter);
        filter.connect(screamGain);
        screamGain.connect(master);
        scream.start(now + 0.03 + offset);
        scream.stop(now + 0.9 + offset);
      });

      const crackle = makeNoiseSource(ctx, 0.34);
      const crackleFilter = ctx.createBiquadFilter();
      const crackleGain = ctx.createGain();
      crackleFilter.type = "highpass";
      crackleFilter.frequency.setValueAtTime(850, now);
      crackleGain.gain.setValueAtTime(0.0001, now + 0.02);
      crackleGain.gain.exponentialRampToValueAtTime(0.22, now + 0.05);
      crackleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
      crackle.connect(crackleFilter);
      crackleFilter.connect(crackleGain);
      crackleGain.connect(master);
      crackle.start(now + 0.02);
    }

    function playFinalNote(ctx, start, frequency, duration, type, volume, destination) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, start);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2400, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.035);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(destination);
      osc.start(start);
      osc.stop(start + duration + 0.04);
    }

    function playFinalMusicBar() {
      const ctx = getAudioContext();
      if (!ctx) {
        return;
      }

      const now = Math.max(ctx.currentTime + 0.03, finalMusicStopTime - 0.1);
      const master = connectLoudMaster(ctx, 0.72);
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.72, now + 0.08);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 3.9);
      const notes = [523.25, 659.25, 783.99, 1046.5, 987.77, 783.99, 880, 1046.5];
      notes.forEach((frequency, index) => {
        playFinalNote(ctx, now + index * 0.22, frequency, 0.34, "triangle", 0.2, master);
      });

      [261.63, 329.63, 392].forEach((frequency) => {
        playFinalNote(ctx, now, frequency, 1.55, "sine", 0.16, master);
      });
      [349.23, 440, 523.25].forEach((frequency) => {
        playFinalNote(ctx, now + 1.74, frequency, 1.65, "sine", 0.15, master);
      });

      [0, 0.88, 1.76, 2.64].forEach((offset) => {
        const sparkle = makeNoiseSource(ctx, 0.18);
        const sparkleFilter = ctx.createBiquadFilter();
        const sparkleGain = ctx.createGain();
        sparkleFilter.type = "bandpass";
        sparkleFilter.frequency.setValueAtTime(4200, now + offset);
        sparkleFilter.Q.setValueAtTime(8, now + offset);
        sparkleGain.gain.setValueAtTime(0.0001, now + offset);
        sparkleGain.gain.exponentialRampToValueAtTime(0.13, now + offset + 0.02);
        sparkleGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.18);
        sparkle.connect(sparkleFilter);
        sparkleFilter.connect(sparkleGain);
        sparkleGain.connect(master);
        sparkle.start(now + offset);
      });

      finalMusicStopTime = now + 3.9;
    }

    function startFinalMusic() {
      stopFinalMusic();
      playFinalMusicBar();
      finalMusicTimer = window.setInterval(playFinalMusicBar, 3600);
    }

    function stopFinalMusic() {
      if (finalMusicTimer) {
        window.clearInterval(finalMusicTimer);
        finalMusicTimer = null;
      }
      finalMusicStopTime = 0;
    }

    function submitAnswer() {
      if (locked || paused || gameOver) {
        return;
      }

      if (!answerValue) {
        feedback.textContent = `快一点，只有 ${chapters[currentChapter].seconds} 秒`;
        feedback.className = "feedback try";
        return;
      }

      getAudioContext();
      const userAnswer = Number(answerValue);
      if (userAnswer !== problem.answer) {
        failRound("wrong");
        return;
      }

      passRound();
    }

    function passRound() {
      if (locked || gameOver) {
        return;
      }

      clearRoundTimer();
      locked = true;
      correctCount += 1;
      results[level] = true;
      updateScoreText();
      renderProgress();
      setControls(true);
      feedback.textContent = "答对了！";
      feedback.className = "feedback good";
      answerBubble.textContent = `答案是 ${problem.answer}！`;
      hero.classList.remove("answering");
      beam.classList.remove("fire");
      answerBubble.classList.remove("show");
      explosion.classList.remove("boom");
      void hero.offsetWidth;
      hero.classList.add("answering");
      beam.classList.add("fire");
      answerBubble.classList.add("show");

      window.setTimeout(() => {
        playMonsterRoar();
        monster.classList.add("defeated");
        explosion.innerHTML = makeExplosionPieces();
        explosion.classList.add("boom");
      }, 430);

      window.setTimeout(() => {
        advanceRound();
      }, 1500);
    }

    function failRound(reason) {
      if (locked || gameOver) {
        return;
      }

      clearRoundTimer();
      getAudioContext();
      locked = true;
      wrongCount += 1;
      results[level] = false;
      updateScoreText();
      renderProgress();
      setControls(true);
      feedback.textContent = reason === "timeout" ? "时间到！怪兽反击了" : "答错了！怪兽反击了";
      feedback.className = "feedback try";
      monster.classList.remove("hit", "attack");
      hero.classList.remove("hurt");
      stage.classList.remove("wrong");
      impact.classList.remove("show");
      void monster.offsetWidth;
      playHeroScream();
      monster.classList.add("attack");
      hero.classList.add("hurt");
      stage.classList.add("wrong");
      impact.classList.add("show");

      window.setTimeout(() => {
        monster.classList.remove("attack");
        hero.classList.remove("hurt");
        stage.classList.remove("wrong");
        impact.classList.remove("show");
        advanceRound();
      }, 920);
    }

    function advanceRound() {
      level += 1;
      if (wrongCount >= 2) {
        showDefeat();
        return;
      }

      if (level >= TOTAL_QUESTIONS) {
        if (correctCount >= PASS_COUNT) {
          showChapterClear();
        } else {
          showDefeat();
        }
        return;
      }

      renderLevel();
    }

    function makeExplosionPieces() {
      return Array.from({ length: 18 }, (_, index) => {
        const r = index * 20;
        const d = randomInt(28, 78);
        return `<span style="--r:${r}deg;--d:${d}px"></span>`;
      }).join("");
    }

    function showChapterClear() {
      const chapter = chapters[currentChapter];
      gameOver = true;
      clearRoundTimer();
      pendingChapterAdvance = currentChapter < chapters.length - 1;
      finalTitle.textContent = chapter.clearText;
      restartBtn.textContent = chapter.clearButton;
      finale.classList.add("show");
      finale.setAttribute("aria-hidden", "false");
      if (pendingChapterAdvance) {
        stopFireworks();
        stopFinalMusic();
      } else {
        startFireworks();
        startFinalMusic();
      }
    }

    function hideFinale() {
      finale.classList.remove("show");
      finale.setAttribute("aria-hidden", "true");
      stopFireworks();
      stopFinalMusic();
      pendingChapterAdvance = false;
    }

    function pauseGame() {
      if (gameOver || paused) {
        return;
      }

      paused = true;
      locked = true;
      clearRoundTimer();
      setControls(true);
      stopFinalMusic();
      stopDefeatSounds();
      stopFireworks();
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      timerText.textContent = "暂停";
      feedback.textContent = "游戏已暂停";
      feedback.className = "feedback try";
      pauseOverlay.classList.add("show");
      pauseOverlay.setAttribute("aria-hidden", "false");
    }

    function resumeGame() {
      if (gameOver || !paused) {
        return;
      }

      paused = false;
      locked = false;
      pauseOverlay.classList.remove("show");
      pauseOverlay.setAttribute("aria-hidden", "true");
      feedback.textContent = "";
      feedback.className = "feedback";
      setControls(false);
      startRoundTimer();
    }

    function showDefeat() {
      gameOver = true;
      clearRoundTimer();
      stopFinalMusic();
      setControls(true);
      defeat.classList.add("show");
      defeat.setAttribute("aria-hidden", "false");
      playDefeatSounds();
      shoutComeOn();
    }

    function hideDefeat() {
      defeat.classList.remove("show");
      defeat.setAttribute("aria-hidden", "true");
      stopDefeatSounds();
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function playDefeatSounds() {
      stopDefeatSounds();
      playHeroScream();
      window.setTimeout(playMonsterRoar, 120);
      window.setTimeout(playHeroScream, 520);
      defeatScreamTimer = window.setInterval(playHeroScream, 1250);
      defeatRoarTimer = window.setInterval(playMonsterRoar, 2400);
    }

    function stopDefeatSounds() {
      if (defeatScreamTimer) {
        window.clearInterval(defeatScreamTimer);
        defeatScreamTimer = null;
      }
      if (defeatRoarTimer) {
        window.clearInterval(defeatRoarTimer);
        defeatRoarTimer = null;
      }
    }

    function shoutComeOn() {
      if (!("speechSynthesis" in window)) {
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance("我的妈呀，你太笨了");
      utterance.lang = "zh-CN";
      utterance.volume = 1;
      utterance.rate = 0.82;
      utterance.pitch = 1.25;
      window.setTimeout(() => {
        window.speechSynthesis.speak(utterance);
      }, 450);
    }

    function appendDigit(digit) {
      if (locked || paused || gameOver || answerValue.length >= 2) {
        return;
      }
      if (answerValue === "0") {
        answerValue = digit;
      } else {
        answerValue += digit;
      }
      updateAnswerDisplay();
      feedback.textContent = "";
      feedback.className = "feedback";
    }

    function clearAnswer() {
      if (locked || paused || gameOver) {
        return;
      }
      answerValue = "";
      updateAnswerDisplay();
      feedback.textContent = "";
      feedback.className = "feedback";
    }

    function resetCurrentChapter() {
      clearRoundTimer();
      hideFinale();
      hideDefeat();
      pauseOverlay.classList.remove("show");
      pauseOverlay.setAttribute("aria-hidden", "true");
      level = 0;
      correctCount = 0;
      wrongCount = 0;
      results = [];
      answerValue = "";
      locked = false;
      paused = false;
      gameOver = false;
      renderLevel();
    }

    function resetGame() {
      currentChapter = 0;
      resetCurrentChapter();
    }

    function continueAfterClear() {
      if (pendingChapterAdvance) {
        currentChapter += 1;
        resetCurrentChapter();
      } else {
        resetGame();
      }
    }

    document.querySelectorAll("[data-key]").forEach((button) => {
      button.addEventListener("click", () => appendDigit(button.dataset.key));
    });
    pauseBtn.addEventListener("click", pauseGame);
    resumeBtn.addEventListener("click", resumeGame);
    submitBtn.addEventListener("click", submitAnswer);
    clearBtn.addEventListener("click", clearAnswer);
    restartBtn.addEventListener("click", continueAfterClear);
    defeatRestartBtn.addEventListener("click", resetCurrentChapter);

    window.addEventListener("keydown", (event) => {
      if (gameOver || paused) {
        return;
      }

      if (/^\d$/.test(event.key)) {
        appendDigit(event.key);
      } else if (event.key === "Backspace" || event.key === "Delete") {
        if (locked) {
          return;
        }
        answerValue = answerValue.slice(0, -1);
        updateAnswerDisplay();
      } else if (event.key === "Enter") {
        submitAnswer();
      }
    });

    function sizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      fireworksCanvas.width = Math.floor(window.innerWidth * ratio);
      fireworksCanvas.height = Math.floor(window.innerHeight * ratio);
      fireworksCanvas.style.width = `${window.innerWidth}px`;
      fireworksCanvas.style.height = `${window.innerHeight}px`;
      fireworksCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function launchFirework() {
      const x = randomInt(60, Math.max(70, window.innerWidth - 60));
      const y = randomInt(70, Math.max(80, Math.floor(window.innerHeight * 0.58)));
      const palette = ["#ffd45a", "#34d9ff", "#ff6fcf", "#62e381", "#ff9045", "#fff8e8"];
      const color = palette[randomInt(0, palette.length - 1)];
      for (let i = 0; i < 42; i += 1) {
        const angle = (Math.PI * 2 * i) / 42;
        const speed = Math.random() * 4.2 + 1.5;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color,
          size: Math.random() * 2.8 + 2
        });
      }
    }

    function drawFireworks() {
      fireworksCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      fireworksCtx.globalCompositeOperation = "lighter";
      particles = particles.filter((p) => p.life > 0.02);
      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.035;
        p.life *= 0.965;
        fireworksCtx.globalAlpha = p.life;
        fireworksCtx.fillStyle = p.color;
        fireworksCtx.beginPath();
        fireworksCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        fireworksCtx.fill();
      });
      fireworksCtx.globalAlpha = 1;
      fireworksCtx.globalCompositeOperation = "source-over";
    }

    function startFireworks() {
      sizeCanvas();
      particles = [];
      launchFirework();
      launchFirework();
      let frame = 0;
      stopFireworks();
      fireworksTimer = window.setInterval(() => {
        frame += 1;
        if (frame % 12 === 0) {
          launchFirework();
        }
        drawFireworks();
      }, 1000 / 30);
    }

    function stopFireworks() {
      if (fireworksTimer) {
        window.clearInterval(fireworksTimer);
        fireworksTimer = null;
      }
      fireworksCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }

    window.addEventListener("resize", () => {
      if (finale.classList.contains("show")) {
        sizeCanvas();
      }
    });

    renderLevel();
    pauseGame();
  </script>
</body>
</html>
